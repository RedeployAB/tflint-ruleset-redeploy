---
name: Vulnerability scan

on: # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    # Weekly run catches advisories disclosed against unchanged code,
    # including Go standard-library issues that Dependabot does not track.
    - cron: "0 6 * * 1"

permissions: {}

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: "go.mod"

      - name: Run govulncheck
        run: make vulncheck
