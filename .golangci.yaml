version: "2"
linters:
  enable:
    - bidichk # Detects dangerous unicode character sequences (trojan source)
    - errchkjson
    - errorlint # Enforces correct error wrapping/comparison (errors.Is/As, %w)
    - exhaustive
    - fatcontext # Detects nested contexts in loops
    - goconst
    - gocritic
    - gocyclo
    - godox
    - gosec # Security linter
    - misspell # Catches common misspellings in comments and strings
    - nolintlint # Flags malformed or unused //nolint directives
    - predeclared # Flags shadowing of predeclared identifiers
    - revive
    - testifylint # Enforces testify assertion best practices
    - unconvert
    - usestdlibvars # Prefers stdlib constants over magic strings
  settings:
    errcheck:
      check-blank: true
    gocritic:
      enabled-checks:
        - ruleguard
    gocyclo:
      min-complexity: 15
    govet:
      enable:
        - shadow
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - goconst
          - gosec
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
