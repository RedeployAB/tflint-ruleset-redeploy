version: "2"
linters:
  enable:
    - errchkjson
    - exhaustive
    - goconst
    - gocritic
    - gocyclo
    - godox
    - revive
    - unconvert
  settings:
    errcheck:
      check-blank: true
    gocritic:
      enabled-checks:
        - ruleguard
    gocyclo:
      min-complexity: 15
    govet:
      enable:
        - shadow
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - goconst
          - gosec
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
